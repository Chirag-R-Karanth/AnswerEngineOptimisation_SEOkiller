<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AEO Optimizer — Gemini Edition</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&family=Syne:wght@800&display=swap");

      :root {
        --bg: #0a0a0f;
        --surface: #12121a;
        --card: #1a1a26;
        --border: rgba(255, 255, 255, 0.07);
        --accent: #00ff9d;
        --text: #e8e8f0;
        --muted: #6b6b80;
        --mono: "Space Mono", monospace;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        margin: 0;
        padding: 0;
      }

      /* Grid Background */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 255, 157, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 255, 157, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        z-index: 0;
      }

      .wrap {
        position: relative;
        z-index: 1;
        max-width: 1100px;
        margin: 0 auto;
        padding: 60px 24px;
      }

      header {
        text-align: center;
        margin-bottom: 50px;
      }
      h1 {
        font-family: "Syne";
        font-size: clamp(40px, 6vw, 72px);
        line-height: 1;
        margin-bottom: 10px;
      }
      h1 span {
        color: var(--accent);
        text-shadow: 0 0 30px rgba(0, 255, 157, 0.3);
      }

      .input-grid {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 20px;
      }
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
      }

      .field-label {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-bottom: 10px;
        display: block;
      }

      textarea,
      input {
        width: 100%;
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 15px;
        border-radius: 8px;
        font-size: 14px;
        margin-bottom: 20px;
      }
      textarea {
        height: 350px;
        resize: none;
        line-height: 1.6;
      }

      .run-btn {
        width: 100%;
        padding: 18px;
        background: var(--accent);
        color: #000;
        border: none;
        border-radius: 6px;
        font-family: var(--mono);
        font-weight: 700;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);
      }
      .run-btn:disabled {
        opacity: 0.5;
      }

      /* Results Display Styles */
      #results {
        display: none;
        margin-top: 50px;
        animation: fadeInUp 0.6s ease;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .score-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        margin-bottom: 20px;
      }
      .score-card {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 20px;
        border-radius: 12px;
        text-align: center;
      }
      .score-card.highlight {
        border-color: var(--accent);
        box-shadow: inset 0 0 15px rgba(0, 255, 157, 0.05);
      }
      .sc-val {
        font-size: 42px;
        font-family: "Syne";
        font-weight: 800;
        color: var(--accent);
      }

      .tab-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }
      .tab-bar {
        background: var(--card);
        display: flex;
        border-bottom: 1px solid var(--border);
      }
      .tab-btn {
        background: transparent;
        border: none;
        padding: 15px 25px;
        color: var(--muted);
        font-family: var(--mono);
        cursor: pointer;
        font-size: 12px;
      }
      .tab-btn.active {
        color: var(--accent);
        border-bottom: 2px solid var(--accent);
      }

      .tab-content {
        padding: 30px;
        line-height: 1.8;
        font-size: 15px;
        white-space: pre-wrap;
      }
      .badge {
        background: rgba(0, 255, 157, 0.1);
        color: var(--accent);
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 11px;
        margin-right: 6px;
        font-family: var(--mono);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>ANSWER ENGINE<br /><span>OPTIMIZER</span></h1>
        <p
          style="
            font-family: var(--mono);
            color: var(--muted);
            font-size: 12px;
            margin-top: 15px;
          "
        >
          HARDCODED GEMINI 1.5 FLASH BACKEND
        </p>
      </header>

      <div class="input-grid">
        <div class="panel">
          <span class="field-label">Source Content</span>
          <textarea id="content" placeholder="Paste text here..."></textarea>
        </div>

        <div class="panel">
          <span class="field-label">Target Intent</span>
          <input type="text" id="query" placeholder="Search Query..." />

          <div
            style="
              background: rgba(255, 255, 255, 0.03);
              padding: 20px;
              border-radius: 8px;
              border: 1px dashed var(--border);
              margin-bottom: 20px;
            "
          >
            <span class="field-label" style="margin-bottom: 15px"
              >Pipeline Sequence</span
            >
            <div style="font-size: 11px; line-height: 2">
              <div style="color: var(--accent)">● Semantic Extraction</div>
              <div>○ Entity Weighting</div>
              <div>○ Snippet Formatting</div>
            </div>
          </div>

          <button class="run-btn" id="runBtn" onclick="runAEO()">
            Execute Optimize
          </button>
        </div>
      </div>

      <div id="results">
        <div class="score-grid">
          <div class="score-card">
            <span class="field-label">Score Before</span>
            <div class="sc-val" id="scBefore" style="color: var(--muted)">
              0
            </div>
          </div>
          <div class="score-card highlight">
            <span class="field-label">Score After</span>
            <div class="sc-val" id="scAfter">0</div>
          </div>
          <div class="score-card">
            <span class="field-label">Rank Prediction</span>
            <div id="resRank" style="font-weight: bold; margin-top: 10px"></div>
          </div>
        </div>

        <div class="tab-card">
          <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab(1)">
              Optimized Output
            </button>
            <button class="tab-btn" onclick="switchTab(2)">Improvements</button>
          </div>
          <div id="tab1" class="tab-content"></div>
          <div id="tab2" class="tab-content" style="display: none"></div>
        </div>
      </div>
    </div>

    <script>
      async function runAEO() {
        const btn = document.getElementById("runBtn");
        btn.disabled = true;
        btn.innerText = "PROCESSING...";

        try {
          const resp = await fetch("/optimize", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              content: document.getElementById("content").value,
              query: document.getElementById("query").value,
            }),
          });

          const data = await resp.json();
          if (data.error) throw new Error(data.error);

          document.getElementById("scBefore").innerText = data.aeo_score_before;
          document.getElementById("scAfter").innerText = data.aeo_score_after;
          document.getElementById("resRank").innerText =
            data.ranking_prediction;
          document.getElementById("tab1").innerText = data.optimized_content;

          // Improvements list
          const imps = data.improvements
            .map(i => `• [${i.category}] ${i.change}`)
            .join("\n");
          document.getElementById("tab2").innerText = imps;

          document.getElementById("results").style.display = "block";
          document
            .getElementById("results")
            .scrollIntoView({ behavior: "smooth" });
        } catch (e) {
          alert("Pipeline Error: " + e.message);
        } finally {
          btn.disabled = false;
          btn.innerText = "EXECUTE OPTIMIZE";
        }
      }

      function switchTab(n) {
        document
          .querySelectorAll(".tab-btn")
          .forEach((b, i) => b.classList.toggle("active", i === n - 1));
        document.getElementById("tab1").style.display =
          n === 1 ? "block" : "none";
        document.getElementById("tab2").style.display =
          n === 2 ? "block" : "none";
      }
    </script>
  </body>
</html>
